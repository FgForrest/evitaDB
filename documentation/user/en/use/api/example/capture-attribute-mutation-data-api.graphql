subscription {
  onProductDataChange(
    entityPrimaryKey: 745,
    containerType: [ATTRIBUTE],
    containerName: ["quantityOnStock"]
  ) {
    version
    index
    operation
    body {
      ... on UpsertAttributeMutation {
        value
      }
      ... on RemoveAttributeMutation {
        name
      }
      ... on ApplyDeltaAttributeMutation {
        delta
      }
    }
  }
}
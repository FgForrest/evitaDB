# Pipeline that checks the documentation when changed

name: CI Dev branch documentation

on:
  push:
    branches: [ "dev" ]            # trap each push to dev branch
    paths:                         # but react only to changes in code or pipeline definition
      - .github/workflows/ci-dev-documentation.yml
      - documentation/user/**.*

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ format('{0}_documentation', github.ref_name) }}  # for the same branch (dev)
  cancel-in-progress: true        # run only one workflow at a time (cancel the previous)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1 checkout sources
      with:
        persist-credentials: false

    - name: Setup Java JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.1.0  # setup JDK 17 for building
      with:
         distribution: 'temurin'
         java-version: '17'
         cache: 'maven'

    - name: Setup dotnet
      uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
      with:
        dotnet-version: '8.0.X'    # setup dotnet 8.0.X for building

    - name: Build with Maven       # run Maven with tests
      run: |
        mvn -T 1C -B package -P documentation -V --fail-at-end -Dmaven.test.skip=false --file pom.xml

    - name: Upload test results    # upload XML with unit test results for debugging
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      if: success() || failure()
      with:
        name: test-results
        path: 'evita*/**/target/surefire-reports/TEST-*.xml'

    - name: Publish Test Report
      uses: ./.github/actions/publish-test-report
      if: success() || failure()
